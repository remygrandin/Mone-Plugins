name: Build & publish plugins

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: plugins-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Mone-Plugins
        uses: actions/checkout@v5
        with:
          path: Mone-Plugins
          fetch-depth: 0

      - name: Checkout Mone (sibling, provides Mone.Contracts ProjectReference)
        uses: actions/checkout@v5
        with:
          repository: remygrandin/Mone
          path: Mone
          ref: main

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore solution
        working-directory: Mone-Plugins
        run: dotnet restore Mone-Plugins.slnx

      - name: Run tests
        working-directory: Mone-Plugins
        run: dotnet test Mone-Plugins.slnx --configuration Release --no-restore --logger "console;verbosity=minimal"

      - name: Build & package plugins
        working-directory: Mone-Plugins
        env:
          BUILD_NUMBER: ${{ github.run_number }}
          GIT_SHA: ${{ github.sha }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: bash .github/scripts/build-plugins.sh

      - name: Publish release "build-${{ github.run_number }}"
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_number }}
          name: Plugin build #${{ github.run_number }}
          body: |
            Auto-built plugins from `${{ github.sha }}` (run #${{ github.run_number }}).

            The `mone-plugins.json` asset on this release is the canonical
            per-build manifest consumed by Mone's `PluginRepositoryService`.
          files: |
            Mone-Plugins/dist/*.zip
            Mone-Plugins/dist/mone-plugins.json
          make_latest: 'true'
          fail_on_unmatched_files: true
